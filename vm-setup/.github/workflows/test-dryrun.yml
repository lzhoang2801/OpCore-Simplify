name: Test setup scripts (--skip-ocs --dryrun)

on:
  push:
    paths:
      - 'setup-macos-vm-xen.sh'
      - 'setup-macos-vm.sh'
      - '.github/workflows/test-dryrun.yml'
  pull_request:
    branches: ['**']
  workflow_dispatch:
    inputs:
      macos_version:
        description: 'Version macOS à tester'
        required: false
        default: 'ventura'
        type: choice
        options: [sequoia, sonoma, ventura, monterey, big-sur]

env:
  MACOS_VERSION: ${{ github.event.inputs.macos_version || 'ventura' }}

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 : vérification syntaxe bash (shellcheck)
  # ────────────────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck (syntaxe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer shellcheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck — script Xen
        run: |
          shellcheck -S warning \
            -e SC2034 \
            -e SC1091 \
            setup-macos-vm-xen.sh

      - name: ShellCheck — script KVM
        run: |
          shellcheck -S warning \
            -e SC2034 \
            -e SC1091 \
            setup-macos-vm.sh

  # ────────────────────────────────────────────────────────────────
  # Job 2 : dry-run du script Xen (--skip-ocs --dryrun)
  # ────────────────────────────────────────────────────────────────
  dryrun-xen:
    name: Dry-run Xen HVM (${{ github.event.inputs.macos_version || 'ventura' }})
    runs-on: ubuntu-latest
    needs: shellcheck

    steps:
      - uses: actions/checkout@v4

      - name: Installer les dépendances minimales (dryrun)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git python3 python3-pip curl wget \
            qemu-utils gdisk dosfstools

      - name: Préparer un faux EFI pour --skip-ocs
        run: |
          mkdir -p /tmp/fake-ocs/Results/EFI/OC
          touch /tmp/fake-ocs/Results/EFI/OC/OpenCore.efi
          # Simuler le .ocs_efi_path que génère run_opcore_simplify
          mkdir -p "${HOME}/VMs/macos-${MACOS_VERSION}"
          echo "/tmp/fake-ocs/Results/EFI" \
            > "${HOME}/VMs/macos-${MACOS_VERSION}/.ocs_efi_path"

      - name: Mocker /proc/xen (Xen dom0 check)
        run: |
          sudo mkdir -p /proc/xen
          echo "control_d" | sudo tee /proc/xen/capabilities
          # Mocker xl
          sudo tee /usr/local/bin/xl > /dev/null <<'XL'
          #!/usr/bin/env bash
          if [[ "${1:-}" == "info" ]]; then
            echo "xen_version          : 4.17.0"
          fi
          XL
          sudo chmod +x /usr/local/bin/xl

      - name: Mocker les commandes systèmes (ovmf, bridge)
        run: |
          # OVMF factice
          sudo mkdir -p /usr/lib/xen/boot
          sudo touch /usr/lib/xen/boot/ovmf.bin
          sudo touch /usr/lib/xen/boot/ovmf-vars.bin
          # Bridge factice
          sudo ip link add xenbr0 type dummy 2>/dev/null || true

      - name: Exécuter setup-macos-vm-xen.sh --skip-ocs --dryrun
        run: |
          sudo bash setup-macos-vm-xen.sh \
            --macos "${MACOS_VERSION}" \
            --skip-deps \
            --skip-ocs \
            --skip-recovery \
            --dryrun
        env:
          HOME: /root

      - name: Vérifier les fichiers générés
        run: |
          set -e
          VM_DIR="/root/VMs/macos-${MACOS_VERSION}"
          echo "── Contenu de ${VM_DIR} ──"
          ls -lh "${VM_DIR}/"

          echo "── Vérifications ──"
          [[ -f "${VM_DIR}/macos-install.xl" ]] && echo "✔ macos-install.xl" || { echo "✘ macos-install.xl absent"; exit 1; }
          [[ -f "${VM_DIR}/macos.xl" ]]         && echo "✔ macos.xl"         || { echo "✘ macos.xl absent"; exit 1; }
          [[ -f "${VM_DIR}/run-install.sh" ]]   && echo "✔ run-install.sh"   || { echo "✘ run-install.sh absent"; exit 1; }
          [[ -f "${VM_DIR}/run.sh" ]]           && echo "✔ run.sh"           || { echo "✘ run.sh absent"; exit 1; }

          echo "── Validation du contenu macos-install.xl ──"
          grep -q 'type.*=.*"hvm"'   "${VM_DIR}/macos-install.xl" && echo "✔ type=hvm"
          grep -q 'bios.*=.*"ovmf"'  "${VM_DIR}/macos-install.xl" && echo "✔ bios=ovmf"
          grep -q 'OpenCore.img'     "${VM_DIR}/macos-install.xl" && echo "✔ OpenCore.img référencé"
          grep -q 'BaseSystem.img'   "${VM_DIR}/macos-install.xl" && echo "✔ BaseSystem.img référencé"
          grep -q 'macos.qcow2'      "${VM_DIR}/macos-install.xl" && echo "✔ macos.qcow2 référencé"

  # ────────────────────────────────────────────────────────────────
  # Job 3 : dry-run du script KVM (--skip-ocs --dryrun)
  # ────────────────────────────────────────────────────────────────
  dryrun-kvm:
    name: Dry-run KVM/QEMU (${{ github.event.inputs.macos_version || 'ventura' }})
    runs-on: ubuntu-latest
    needs: shellcheck

    steps:
      - uses: actions/checkout@v4

      - name: Installer les dépendances minimales
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git python3 python3-pip curl wget \
            qemu-utils gdisk dosfstools

      - name: Préparer un faux EFI pour --skip-ocs
        run: |
          mkdir -p /tmp/fake-ocs/Results/EFI/OC
          touch /tmp/fake-ocs/Results/EFI/OC/OpenCore.efi
          mkdir -p "${HOME}/VMs/macos-${MACOS_VERSION}"
          echo "/tmp/fake-ocs/Results/EFI" \
            > "${HOME}/VMs/macos-${MACOS_VERSION}/.ocs_efi_path"

      - name: Mocker /dev/kvm et OVMF
        run: |
          # KVM factice
          sudo mknod /dev/kvm c 10 232 2>/dev/null || true
          sudo chmod 666 /dev/kvm
          # OVMF factice
          sudo mkdir -p /usr/share/qemu
          sudo touch /usr/share/qemu/ovmf-x86_64-4m-code.bin
          sudo touch /usr/share/qemu/ovmf-x86_64-4m-vars.bin

      - name: Exécuter setup-macos-vm.sh --skip-ocs --dryrun
        run: |
          sudo bash setup-macos-vm.sh \
            --macos "${MACOS_VERSION}" \
            --skip-deps \
            --skip-ocs \
            --skip-recovery \
            --dryrun
        env:
          HOME: /root

      - name: Vérifier les fichiers générés
        run: |
          set -e
          VM_DIR="/root/VMs/macos-${MACOS_VERSION}"
          echo "── Contenu de ${VM_DIR} ──"
          ls -lh "${VM_DIR}/"

          echo "── Vérifications ──"
          [[ -f "${VM_DIR}/run-macos.sh" ]]           && echo "✔ run-macos.sh"           || { echo "✘ absent"; exit 1; }
          [[ -f "${VM_DIR}/run-macos-installed.sh" ]] && echo "✔ run-macos-installed.sh" || { echo "✘ absent"; exit 1; }

          echo "── Validation du contenu run-macos.sh ──"
          grep -q 'qemu-system-x86_64'  "${VM_DIR}/run-macos.sh" && echo "✔ qemu-system-x86_64"
          grep -q 'machine q35'         "${VM_DIR}/run-macos.sh" && echo "✔ machine q35"
          grep -q 'OpenCore.img'        "${VM_DIR}/run-macos.sh" && echo "✔ OpenCore.img référencé"

  # ────────────────────────────────────────────────────────────────
  # Résumé final
  # ────────────────────────────────────────────────────────────────
  summary:
    name: Résumé
    runs-on: ubuntu-latest
    needs: [dryrun-xen, dryrun-kvm]
    if: always()
    steps:
      - name: Résultat global
        run: |
          XEN="${{ needs.dryrun-xen.result }}"
          KVM="${{ needs.dryrun-kvm.result }}"
          echo "Xen HVM  : ${XEN}"
          echo "KVM/QEMU : ${KVM}"
          [[ "$XEN" == "success" && "$KVM" == "success" ]] && exit 0 || exit 1
